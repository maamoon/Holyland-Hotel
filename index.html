<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Holyland Hotel Amman — 3-star hotel in Jordan. Book, contact, follow us.">
  <title>Holyland Hotel Amman</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=DM+Sans:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page">
    <!-- Hero + Book -->
    <section class="hero">
      <div class="hero__bg" style="background-image: url('images/hero.jpg'), url('https://rate.picscache.com/images/35685/upload/1500X770/da42e75a474256a5bee8bd7cccdcf260.jpg');"></div>
      <div class="hero__overlay"></div>
      <div class="hero__content">
        <h1 class="hero__title">Holyland Hotel</h1>
        <p class="hero__location">Amman, Jordan</p>
        <a href="https://www.holyland-hotel.com/en/" class="hero__btn" target="_blank" rel="noopener">Book Your Stay</a>
      </div>
    </section>

    <!-- Main: Images + Links -->
    <div class="main">
      <!-- Images -->
      <section class="images">
        <div class="images__grid">
          <div class="images__item images__item--large" style="background-image: url('images/gallery-1.jpg'), url('https://rate.picscache.com/images/35685/upload/1500X770/3ce1e87aa4fa6dd0de0d42c321d24c37.jpg');"></div>
          <div class="images__item" style="background-image: url('images/gallery-2.jpg'), url('https://rate.picscache.com/images/35685/upload/600X600/aff3be909d3ae95ef6f8d5c3eafe0df8.jpg');"></div>
          <div class="images__item" style="background-image: url('images/gallery-3.jpg'), url('https://rate.picscache.com/images/35685/upload/500X256/e943c66da82cbfec9a00b3fd1f9a61b7.jpg');"></div>
          <div class="images__item" style="background-image: url('images/hero.jpg'), url('https://rate.picscache.com/images/35685/upload/500X256/b72d26ae7ae501fd1dfde55407eaa263.jpg');"></div>
        </div>
      </section>

      <!-- Contact + Social + Reviews -->
      <section class="links">
        <h2 class="links__title">Contact</h2>
        <a href="tel:+962786010810" class="link-btn link-btn--contact">
          <span class="link-btn__icon">📞</span>
          <span class="link-btn__text">+962 7 8601 0810</span>
        </a>
        <a href="mailto:reservation@holyland-hotel.com" class="link-btn link-btn--contact">
          <span class="link-btn__icon">✉️</span>
          <span class="link-btn__text">reservation@holyland-hotel.com</span>
        </a>
        <a href="https://wa.me/message/VDRXYGNW5USBL1" class="link-btn link-btn--whatsapp" target="_blank" rel="noopener">
          <span class="link-btn__icon">💬</span>
          <span class="link-btn__text">WhatsApp</span>
        </a>

        <h2 class="links__title">Follow Us</h2>
        <a href="https://www.instagram.com/holyland_hotel_amman/" class="link-btn link-btn--social" target="_blank" rel="noopener">
          <span class="link-btn__icon">📷</span>
          <span class="link-btn__text">Instagram</span>
        </a>
        <a href="https://www.facebook.com/holylandhotel.jo" class="link-btn link-btn--social" target="_blank" rel="noopener">
          <span class="link-btn__icon">👍</span>
          <span class="link-btn__text">Facebook</span>
        </a>
        <a href="https://www.google.com/search?q=Holyland+Hotel+Amman" class="link-btn link-btn--social" target="_blank" rel="noopener">
          <span class="link-btn__icon">🔍</span>
          <span class="link-btn__text">Google</span>
        </a>

        <h2 class="links__title">Review Us</h2>
        <a href="https://g.page/r/CQReP7OoNzCeEAE/review" class="link-btn link-btn--review" target="_blank" rel="noopener">
          <span class="link-btn__icon">⭐</span>
          <span class="link-btn__text">Google</span>
        </a>
        <a href="https://www.tripadvisor.com/UserReviewEdit-g293986-d17783111-Holyland_Hotel-Amman_Amman_Governorate.html" class="link-btn link-btn--review" target="_blank" rel="noopener">
          <span class="link-btn__icon">🌍</span>
          <span class="link-btn__text">Tripadvisor</span>
        </a>
        <a href="https://www.facebook.com/holylandhotel.jo/reviews" class="link-btn link-btn--review" target="_blank" rel="noopener">
          <span class="link-btn__icon">👍</span>
          <span class="link-btn__text">Facebook</span>
        </a>

        <a href="https://maps.app.goo.gl/8z69zGr4ea31jgvJ7" class="link-btn link-btn--map" target="_blank" rel="noopener">
          <span class="link-btn__icon">📍</span>
          <span class="link-btn__text">View on Map</span>
        </a>
      </section>
    </div>
  </main>
</body>
</html>
