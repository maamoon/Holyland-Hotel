<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Holyland Hotel Amman — 3-star hotel in Jordan. Book, contact, follow us.">
  <title>Holyland Hotel Amman</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=DM+Sans:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
  <main class="page">
    <!-- Hero + Book -->
    <section class="hero">
      <div class="hero__bg" style="background-image: url('images/hero.jpg'), url('https://rate.picscache.com/images/35685/upload/1500X770/da42e75a474256a5bee8bd7cccdcf260.jpg');"></div>
      <div class="hero__overlay"></div>
      <div class="hero__content">
        <h1 class="hero__title">Holyland Hotel</h1>
        <p class="hero__location">Amman, Jordan</p>
        <a href="https://www.holyland-hotel.com/en/" class="hero__btn" target="_blank" rel="noopener">Let's Plan Your Stay</a>
      </div>
    </section>

    <!-- Main: Links + Map -->
    <div class="main">
      <!-- Contact + Social + Reviews -->
      <section class="links">
        <div class="links__group links__group--review links__group--first">
          <h2 class="links__title">Review Us</h2>
          <div class="link-buttons">
            <a href="https://g.page/r/CQReP7OoNzCeEAE/review" class="link-btn link-btn--review link-btn--google" target="_blank" rel="noopener">
              <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/google/4285F4" alt="" width="24" height="24" class="link-btn__img"></span>
              <span class="link-btn__text">Google</span>
            </a>
            <a href="https://www.tripadvisor.com/UserReviewEdit-g293986-d17783111-Holyland_Hotel-Amman_Amman_Governorate.html" class="link-btn link-btn--review link-btn--tripadvisor" target="_blank" rel="noopener">
              <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/tripadvisor/00AF87" alt="" width="24" height="24" class="link-btn__img"></span>
              <span class="link-btn__text">Tripadvisor</span>
            </a>
            <a href="https://www.facebook.com/holylandhotel.jo/reviews" class="link-btn link-btn--review link-btn--facebook" target="_blank" rel="noopener">
              <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/facebook/1877F2" alt="" width="24" height="24" class="link-btn__img"></span>
              <span class="link-btn__text">Facebook</span>
            </a>
          </div>
        </div>
        <div class="links__row">
          <div class="links__group">
            <h2 class="links__title">Contact</h2>
            <div class="link-buttons">
<a href="tel:+962786010810" class="link-btn link-btn--contact link-btn--phone" title="+962 7 8601 0810">
              <span class="link-btn__icon"><i class="fa-solid fa-phone"></i></span>
              <span class="link-btn__text">Phone</span>
            </a>
            <a href="mailto:reservation@holyland-hotel.com" class="link-btn link-btn--contact link-btn--email" title="reservation@holyland-hotel.com">
              <span class="link-btn__icon"><i class="fa-solid fa-envelope"></i></span>
              <span class="link-btn__text">Email</span>
            </a>
              <a href="https://wa.me/message/VDRXYGNW5USBL1" class="link-btn link-btn--whatsapp" target="_blank" rel="noopener">
                <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/whatsapp/25D366" alt="" width="24" height="24" class="link-btn__img"></span>
                <span class="link-btn__text">WhatsApp</span>
              </a>
            </div>
          </div>
          <div class="links__group">
            <h2 class="links__title">Follow Us</h2>
            <div class="link-buttons">
            <a href="https://www.instagram.com/holyland_hotel_amman/" class="link-btn link-btn--social link-btn--instagram" target="_blank" rel="noopener">
              <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/instagram/E4405F" alt="" width="24" height="24" class="link-btn__img"></span>
              <span class="link-btn__text">Instagram</span>
            </a>
            <a href="https://www.facebook.com/holylandhotel.jo" class="link-btn link-btn--social link-btn--facebook" target="_blank" rel="noopener">
              <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/facebook/1877F2" alt="" width="24" height="24" class="link-btn__img"></span>
              <span class="link-btn__text">Facebook</span>
            </a>
            <a href="https://www.google.com/search?q=Holyland+Hotel+Amman" class="link-btn link-btn--social link-btn--google" target="_blank" rel="noopener">
              <span class="link-btn__icon"><img src="https://cdn.simpleicons.org/google/4285F4" alt="" width="24" height="24" class="link-btn__img"></span>
              <span class="link-btn__text">Google</span>
            </a>
          </div>
        </div>
        </div>
      </section>

      <!-- Map -->
      <section class="map-section">
        <div class="map-wrapper">
          <iframe
            class="map-embed"
            src="https://www.openstreetmap.org/export/embed.html?bbox=35.864%2C32.012%2C35.871%2C32.018&layer=mapnik&marker=32.01463%2C35.86748"
            title="Holyland Hotel location"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
          <a href="https://maps.app.goo.gl/8z69zGr4ea31jgvJ7" class="map-link" target="_blank" rel="noopener">Open in Google Maps</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
